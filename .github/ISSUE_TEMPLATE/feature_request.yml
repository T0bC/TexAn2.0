name: Feature Request
description: Suggest a new feature or improvement for AnStatR
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Motivation
      description: What would this feature help you achieve, or what part of your workflow could be improved?
      placeholder: |
        Examples:
        - "It would be great to have a violin plot option for comparing group distributions."
        - "It would be nice if my column selections were preserved when switching between analysis tabs."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work. Be as specific as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples.
    validations:
      required: false
