name: Bug Report
description: Report a bug or unexpected behavior in AnStatR
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AnStatR Version
      description: Which version of AnStatR are you using? (shown in Settings)
      placeholder: e.g. 2026.7
    validations:
      required: true

  - type: input
    id: session_id
    attributes:
      label: Session ID
      description: Your session ID (shown in Settings). This helps us retrieve the logs.
      placeholder: e.g. a1b2c3d4
    validations:
      required: true

  - type: input
    id: datetime
    attributes:
      label: Date and Time of Occurrence
      description: When did the bug occur? Please include date and approximate time with timezone.
      placeholder: e.g. 2026-05-20 14:30 (CET)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Other
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
