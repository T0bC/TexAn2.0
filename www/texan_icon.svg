<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="surfaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#008ac9"/>
      <stop offset="100%" stop-color="#006a9b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — corporate blue -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#surfaceGrad)"/>

  <!-- 3D surface profile wave — white, bold, the hero element -->
  <!-- Represents a roughness/topography profile (Sa, Sz, etc.) -->
  <path d="M 8 34
           C 12 26, 16 40, 22 30
           S 28 22, 32 32
           S 38 42, 44 28
           S 50 20, 56 34"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baseline reference line — grey, dashed -->
  <line x1="8" y1="34" x2="56" y2="34" stroke="#848587" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Three stat bars in the lower section — showing analytics/statistics -->
  <rect x="14" y="44" width="7" height="12" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="28" y="40" width="7" height="16" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="42" y="46" width="7" height="10" rx="1.5" fill="white" opacity="0.85"/>

  <!-- Small data points on the profile curve for emphasis -->
  <circle cx="22" cy="30" r="2.5" fill="white"/>
  <circle cx="32" cy="32" r="2.5" fill="white"/>
  <circle cx="44" cy="28" r="2.5" fill="white"/>
</svg>
